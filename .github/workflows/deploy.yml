name: FirePhenix Website CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to production after pushing the image
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  website:
    uses: dev-lukas/ci-cd-actions/.github/workflows/node-static.yml@main
    with:
      image_name: firephenix-website
      node_version: "20"
      smoke_path: /
      deploy: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == true }}
      deploy_services: website
    secrets: inherit

  integration:
    needs: website
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    uses: dev-lukas/ci-cd-actions/.github/workflows/firephenix-stack.yml@main
    with:
      component: website
      image_name: firephenix-website
    secrets: inherit
